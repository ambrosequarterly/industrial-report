name: Quarterly CBRE Report Check

on:
  # Runs on the 10th of January, April, July, and October at 8am ET (12:00 UTC)
  # This gives CBRE ~10 days after quarter end to publish all market reports
  schedule:
    - cron: '0 12 10 1,4,7,10 *'

  # Can also be triggered manually from the Actions tab at any time
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check CBRE for new reports and send summary email
        env:
          OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_PASSWORD: ${{ secrets.OUTLOOK_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        run: python check_reports.py

      - name: Commit website timestamp update
        run: |
          git config --global user.name "CBRE Report Bot"
          git config --global user.email "actions@github.com"
          git add index.html found_reports.json
          git diff --staged --quiet || git commit -m "Auto-update: CBRE quarterly check $(date +'%Y-%m-%d')"
          git push
